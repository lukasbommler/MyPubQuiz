    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .blog-card {
      background: var(--card);
      border: 1px solid var(--border);

      transform: translateY(-3px);
    }

      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);

      padding: 1.25rem;

      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }
    .blog-tag {
      display: inline-flex;
      align-items: center;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      width: fit-content;

    .blog-card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.6;

      align-items: center;
      justify-content: space-between;

      color: var(--text2);
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      margin-top: 0.25rem;
    }
    .blog-card-meta span { font-weight: 500; }

    /* ── Article overlay ── */
    .article-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      z-index: 1000;
      padding: 2rem 1rem;
      overflow-y: auto;
      animation: fadeIn 0.2s ease;

    .article-overlay.hidden { display: none; }
    .article-modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 680px;
      padding: 2rem;
      position: relative;
      animation: fadeIn 0.25s ease;
    }
    .article-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 1rem;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;

    .article-tag { width: fit-content; }
    .article-title { font-size: 1.4rem; font-weight: 800; line-height: 1.3; padding-right: 2.5rem; }
    .article-meta { font-size: 0.8rem; color: var(--text2); }

    .article-body ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .article-body ul li { margin-bottom: 0.3rem; }
    .article-body strong { color: var(--text); }

    @media (max-width: 600px) {
      .blog-grid { grid-template-columns: 1fr; }
      .article-modal { padding: 1.5rem; }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function getArticle(id) {
      const data = ARTICLES[id];
      return data ? (data[window.MPQ_LANG] || data.en) : null;
    }

    function renderBlogCards() {
      const grid = document.querySelector('.blog-grid');
      grid.innerHTML = Object.entries(ARTICLES).map(([id, data]) => {
        const a = data[window.MPQ_LANG] || data.en;
        return `
          <div class="blog-card" onclick="openArticle('${id}')">
            <div class="blog-card-hero">${data.icon}</div>
            <div class="blog-card-body">
              <span class="blog-tag">${a.tag}</span>
              <div class="blog-card-title">${a.title}</div>
              <div class="blog-card-excerpt">${a.excerpt}</div>
              <div class="blog-card-meta">
                <span>${a.date}</span>
                <span>${a.readTime}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function openArticle(id) {
      const a = getArticle(id);
      if (!a) return;
      document.getElementById('article-content').innerHTML = `
        <div class="article-header">
          <span class="blog-tag article-tag">${a.tag}</span>
          <div class="article-title">${a.title}</div>
          <div class="article-meta">${a.date} &nbsp;·&nbsp; ${a.readTime}</div>
        </div>
        <div class="article-body">${a.body}</div>
      `;
      document.getElementById('article-overlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeArticle() {
      document.getElementById('article-overlay').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function closeArticleOnBackdrop(e) {
      if (e.target === document.getElementById('article-overlay')) closeArticle();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeArticle(); });

    // Init
    applyI18n();
    renderBlogCards();
  </script>
